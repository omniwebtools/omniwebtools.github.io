<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Case Converter – ToolBox</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --ink: #1a1a1a;
      --muted: #888;
      --border: #d8d3c8;
      --card: #ffffff;
      --accent-yellow: #f5c842;
      --accent-red: #e84040;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245,242,235,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 0.06em;
      color: var(--ink);
      line-height: 1;
      text-decoration: none;
    }

    .logo sup {
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      background: var(--accent-yellow);
      color: var(--ink);
      padding: 2px 6px;
      border-radius: 4px;
      vertical-align: super;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .back-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--ink); }

    .hero {
      position: relative;
      z-index: 1;
      padding: 60px 40px 40px;
      max-width: 900px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-eyebrow::before {
      content: '';
      width: 30px;
      height: 1px;
      background: var(--muted);
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .hero h1 .highlight {
      color: var(--accent-red);
      position: relative;
      display: inline-block;
    }

    .hero h1 .highlight::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 0; right: 0;
      height: 5px;
      background: var(--accent-yellow);
      z-index: -1;
      transform: skewX(-3deg);
    }

    .hero-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 500px;
    }

    /* MAIN */
    .section {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* TEXT BOX */
    .text-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .text-card:focus-within {
      border-color: var(--accent-yellow);
      box-shadow: 0 0 0 3px rgba(245,200,66,0.15);
    }

    .card-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafaf8;
    }

    .stats {
      display: flex;
      gap: 16px;
    }

    .stat {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .stat span { color: var(--ink); font-weight: 500; }

    .active-case-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: var(--accent-yellow);
      color: var(--ink);
      padding: 3px 10px;
      border-radius: 100px;
      display: none;
    }

    .active-case-badge.visible { display: inline-block; }

    textarea {
      width: 100%;
      min-height: 220px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: 0.92rem;
      line-height: 1.8;
      padding: 20px;
      resize: vertical;
    }

    textarea::placeholder { color: #c5c0b5; }

    .card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: #fafaf8;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      display: flex;
      gap: 8px;
    }

    .clear-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }

    .copy-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 6px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: #333; }
    .copy-btn.copied { background: #16a34a; }

    /* CASE BUTTONS */
    .section-label { margin-top: 0; }

    .cases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    .case-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.4s ease forwards;
    }

    .case-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent-yellow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .case-btn:hover { border-color: var(--accent-yellow); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
    .case-btn:hover::after { transform: scaleX(1); }
    .case-btn.active { border-color: var(--accent-yellow); background: #fffbee; }
    .case-btn.active::after { transform: scaleX(1); }

    .btn-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.05em;
      color: var(--ink);
      display: block;
      margin-bottom: 3px;
    }

    .btn-preview {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .case-btn:nth-child(1)  { animation-delay: 0.03s; }
    .case-btn:nth-child(2)  { animation-delay: 0.06s; }
    .case-btn:nth-child(3)  { animation-delay: 0.09s; }
    .case-btn:nth-child(4)  { animation-delay: 0.12s; }
    .case-btn:nth-child(5)  { animation-delay: 0.15s; }
    .case-btn:nth-child(6)  { animation-delay: 0.18s; }
    .case-btn:nth-child(7)  { animation-delay: 0.21s; }
    .case-btn:nth-child(8)  { animation-delay: 0.24s; }
    .case-btn:nth-child(9)  { animation-delay: 0.27s; }
    .case-btn:nth-child(10) { animation-delay: 0.30s; }
    .case-btn:nth-child(11) { animation-delay: 0.33s; }
    .case-btn:nth-child(12) { animation-delay: 0.36s; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--ink);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 12px 20px;
      border-radius: 100px;
      transform: translateY(60px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.06em; color: var(--muted); }
    .footer-note { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .hero, .section { padding-left: 20px; padding-right: 20px; }
      .cases-grid { grid-template-columns: 1fr 1fr; }
      footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">ToolBox <sup>FREE</sup></a>
  <a href="index.html" class="back-btn">← All Tools</a>
</header>

<section class="hero">
  <div class="hero-eyebrow">Text Tool</div>
  <h1><span class="highlight">Case</span><br>Converter.</h1>
  <p class="hero-desc">Type your text, click any case button — text changes instantly right in the box.</p>
</section>

<div class="section">
  <div class="section-label" style="margin-bottom:16px;">// your text</div>

  <div class="text-card">
    <div class="card-header">
      <div class="stats">
        <div class="stat">chars <span id="charCount">0</span></div>
        <div class="stat">words <span id="wordCount">0</span></div>
        <div class="stat">lines <span id="lineCount">0</span></div>
      </div>
      <span class="active-case-badge" id="activeBadge">—</span>
    </div>
    <textarea id="mainText" placeholder="Type or paste your text here, then click a case button below…"></textarea>
    <div class="card-footer">
      <div class="footer-left">
        <button class="clear-btn" id="clearBtn">✕ Clear</button>
      </div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
  </div>

  <div class="section-label" style="margin-top:32px; margin-bottom:16px;">// pick a case — text will change instantly</div>

  <div class="cases-grid">
    <button class="case-btn" data-case="sentence"><span class="btn-name">Sentence case</span><span class="btn-preview">This is sentence case.</span></button>
    <button class="case-btn" data-case="lower"><span class="btn-name">lower case</span><span class="btn-preview">this is lower case.</span></button>
    <button class="case-btn" data-case="upper"><span class="btn-name">UPPER CASE</span><span class="btn-preview">THIS IS UPPER CASE.</span></button>
    <button class="case-btn" data-case="capitalized"><span class="btn-name">Capitalized Case</span><span class="btn-preview">This Is Capitalized.</span></button>
    <button class="case-btn" data-case="alternating"><span class="btn-name">aLtErNaTiNg</span><span class="btn-preview">tHiS Is aLtErNaTiNg.</span></button>
    <button class="case-btn" data-case="title"><span class="btn-name">Title Case</span><span class="btn-preview">This Is a Title.</span></button>
    <button class="case-btn" data-case="inverse"><span class="btn-name">iNVERSE cASE</span><span class="btn-preview">tHIS iS iNVERSE.</span></button>
    <button class="case-btn" data-case="camel"><span class="btn-name">camelCase</span><span class="btn-preview">thisIsCamelCase</span></button>
    <button class="case-btn" data-case="pascal"><span class="btn-name">PascalCase</span><span class="btn-preview">ThisIsPascalCase</span></button>
    <button class="case-btn" data-case="snake"><span class="btn-name">snake_case</span><span class="btn-preview">this_is_snake_case</span></button>
    <button class="case-btn" data-case="kebab"><span class="btn-name">kebab-case</span><span class="btn-preview">this-is-kebab-case</span></button>
    <button class="case-btn" data-case="constant"><span class="btn-name">CONSTANT_CASE</span><span class="btn-preview">THIS_IS_CONSTANT</span></button>
  </div>
</div>

<footer>
  <div class="footer-logo">ToolBox</div>
  <div class="footer-note">Free · No signup · No tracking</div>
</footer>

<div class="toast" id="toast">✓ Copied to clipboard</div>

<script>
  var MINORS = {'a':1,'an':1,'the':1,'and':1,'but':1,'or':1,'nor':1,'for':1,'so':1,'yet':1,'at':1,'by':1,'in':1,'of':1,'on':1,'to':1,'up':1,'as':1,'is':1,'it':1};

  var converters = {
    sentence:   function(t){ return t.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g,function(c){return c.toUpperCase();}); },
    lower:      function(t){ return t.toLowerCase(); },
    upper:      function(t){ return t.toUpperCase(); },
    capitalized:function(t){ return t.toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();}); },
    alternating:function(t){ return t.split('').map(function(c,i){return i%2===0?c.toLowerCase():c.toUpperCase();}).join(''); },
    title:      function(t){
      var w=t.toLowerCase().split(' ');
      return w.map(function(x,i){return(i===0||i===w.length-1||!MINORS[x])?x.replace(/^\w/,function(c){return c.toUpperCase();}):x;}).join(' ');
    },
    inverse:    function(t){ return t.split('').map(function(c){return c===c.toUpperCase()?c.toLowerCase():c.toUpperCase();}).join(''); },
    camel:      function(t){ return t.trim().split(/[\s_\-]+/).map(function(w,i){return i===0?w.toLowerCase():w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();}).join(''); },
    pascal:     function(t){ return t.trim().split(/[\s_\-]+/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();}).join(''); },
    snake:      function(t){ return t.trim().replace(/[\s\-]+/g,'_').replace(/([a-z])([A-Z])/g,'$1_$2').toLowerCase(); },
    kebab:      function(t){ return t.trim().replace(/[\s_]+/g,'-').replace(/([a-z])([A-Z])/g,'$1-$2').toLowerCase(); },
    constant:   function(t){ return t.trim().replace(/[\s\-]+/g,'_').replace(/([a-z])([A-Z])/g,'$1_$2').toUpperCase(); }
  };

  var caseLabels = {
    sentence:'Sentence Case', lower:'lower case', upper:'UPPER CASE',
    capitalized:'Capitalized Case', alternating:'aLtErNaTiNg', title:'Title Case',
    inverse:'iNVERSE cASE', camel:'camelCase', pascal:'PascalCase',
    snake:'snake_case', kebab:'kebab-case', constant:'CONSTANT_CASE'
  };

  var textarea = document.getElementById('mainText');

  function updateStats() {
    var t = textarea.value;
    document.getElementById('charCount').textContent = t.length;
    document.getElementById('wordCount').textContent = t.trim()==='' ? 0 : t.trim().split(/\s+/).length;
    document.getElementById('lineCount').textContent = t==='' ? 0 : t.split('\n').length;
  }

  function applyCase(type) {
    var val = textarea.value;
    if (val.trim() === '') return;
    // remember cursor
    var start = textarea.selectionStart;
    var end = textarea.selectionEnd;
    var converted = converters[type](val);
    textarea.value = converted;
    // restore cursor roughly
    textarea.selectionStart = start;
    textarea.selectionEnd = end;
    updateStats();
    // active button
    document.querySelectorAll('.case-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('[data-case="' + type + '"]').classList.add('active');
    // badge
    var badge = document.getElementById('activeBadge');
    badge.textContent = caseLabels[type];
    badge.classList.add('visible');
  }

  textarea.addEventListener('input', updateStats);

  document.querySelectorAll('.case-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      applyCase(this.getAttribute('data-case'));
    });
  });

  document.getElementById('clearBtn').addEventListener('click', function(){
    textarea.value = '';
    updateStats();
    document.querySelectorAll('.case-btn').forEach(function(b){ b.classList.remove('active'); });
    var badge = document.getElementById('activeBadge');
    badge.classList.remove('visible');
    textarea.focus();
  });

  document.getElementById('copyBtn').addEventListener('click', function(){
    var text = textarea.value;
    if (!text.trim()) return;
    navigator.clipboard.writeText(text).then(function(){
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      document.getElementById('toast').classList.add('show');
      setTimeout(function(){
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
        document.getElementById('toast').classList.remove('show');
      }, 2000);
    });
  });
</script>
</body>
</html>
